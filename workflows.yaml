## Workflow 3 : Reporting hebdomadaire

```yaml
# make_workflow_weekly_report.yaml
version: '3'
name: "NexusAI - Rapport hebdo automatique"

trigger:
  type: schedule
  cron: "0 8 * * 1"   # Chaque lundi à 8h00

actions:
  - name: "Fetch GA4 data"
    type: http_request
    url: "https://analyticsdata.googleapis.com/v1beta/properties/{{GA4_PROPERTY_ID}}:runReport"
    method: POST
    auth: "{{GA4_SERVICE_ACCOUNT}}"
    body:
      metrics: [{ name: "sessions" }, { name: "activeUsers" }, { name: "conversions" }]
      dateRanges: [{ startDate: "7daysAgo", endDate: "today" }]

  - name: "Fetch HubSpot new leads"
    type: hubspot_list_contacts
    filter: "created_date > last_week"

  - name: "Générer rapport avec IA"
    type: anthropic_claude
    model: "claude-sonnet-4-20250514"
    prompt: |
      Génère un rapport hebdomadaire concis en Markdown à partir de ces données :
      
      GA4 : {{step1.result}}
      Leads HubSpot : {{step2.result}}
      
      Format : 
      - Chiffres clés (3 lignes max)
      - Ce qui a bien fonctionné
      - Points d'attention
      - Actions recommandées cette semaine

  - name: "Envoyer rapport Slack"
    type: slack
    channel: "#weekly-report"
    message: "📊 *Rapport semaine du {{date}}*\n\n{{step3.result}}"
```

