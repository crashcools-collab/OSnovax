## Workflow 2 : Newsletter → Séquence d'onboarding

```yaml
# make_workflow_newsletter_onboarding.yaml
version: '3'
name: "NexusAI - Onboarding nouvel abonné blog"

trigger:
  type: webhook
  url: "{{NEWSLETTER_FORM_WEBHOOK}}"

actions:
  - name: "Attendre 0 minutes"
    type: delay
    duration: 0

  - name: "Email J+0 : Bienvenue"
    type: email
    subject: "Bienvenue — voici les 3 articles à lire en premier"
    body: |
      Bienvenue dans la newsletter NexusAI.
      
      Pour démarrer, voici les 3 articles les plus lus :
      
      → 5 workflows Make qui éliminent 10h/semaine
      → Architecture d'un agent IA multi-outils
      → RAG vs Fine-tuning : benchmarks

  - name: "Attendre 3 jours"
    type: delay
    duration: 3
    unit: days

  - name: "Email J+3 : Cas client"
    type: email
    subject: "Comment on a automatisé 70% des litiges d'un 3PL"
    body: "Étude de cas complète avec architecture et métriques..."

  - name: "Attendre 7 jours"
    type: delay
    duration: 7
    unit: days

  - name: "Email J+7 : CTA soft"
    type: email
    subject: "Votre projet IA — on peut regarder ça ensemble ?"
    body: "Si vous avez un cas d'usage en tête, on fait un audit de 30 min gratuit..."
```

