# Automatisations NexusAI — Make / n8n

## Workflow 1 : Nouveau contact → Notification + CRM

```yaml
# make_workflow_new_contact.yaml
version: '3'
name: "NexusAI - Nouveau lead site web"

trigger:
  type: webhook
  url: "{{NETLIFY_FORM_WEBHOOK_URL}}"
  # Obtenir dans Netlify > Forms > Outgoing Notifications > Add notification > Webhook

actions:
  - name: "Envoyer notification Slack"
    type: slack
    channel: "#leads"
    message: |
      🔥 Nouveau lead sur le site !
      👤 {{data.firstname}} {{data.lastname}}
      🏢 {{data.company}} ({{data.sector}})
      📧 {{data.email}}
      💰 Budget: {{data.budget}}
      ⚡ Urgence: {{data.urgency}}
      📝 Message: {{data.message}}

  - name: "Créer contact HubSpot"
    type: hubspot_create_contact
    fields:
      email: "{{data.email}}"
      firstname: "{{data.firstname}}"
      lastname: "{{data.lastname}}"
      company: "{{data.company}}"
      phone: "{{data.phone}}"
      hs_lead_status: "NEW"
      lead_source: "Site web"
      budget_estimate: "{{data.budget}}"

  - name: "Email de confirmation au lead"
    type: email
    provider: sendgrid
    from: "hello@nexusai.fr"
    to: "{{data.email}}"
    subject: "✓ Votre demande NexusAI — réponse sous 24h"
    template: |
      Bonjour {{data.firstname}},

      Nous avons bien reçu votre demande concernant :
      "{{data.message|truncate:100}}"

      Un membre de notre équipe vous contactera sous 24h (jours ouvrés)
      pour discuter de votre projet et proposer un call de 30 minutes.

      En attendant, vous pouvez consulter nos études de cas :
      https://nexusai.fr/portfolio.html

      — L'équipe NexusAI
```

