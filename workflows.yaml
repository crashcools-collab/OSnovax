## Variables d'environnement à configurer

```env
# Netlify
NETLIFY_FORM_WEBHOOK_URL=https://hooks.zapier.com/...  # ou Make webhook

# Slack
SLACK_BOT_TOKEN=xoxb-...
SLACK_LEADS_CHANNEL_ID=C...
SLACK_REPORT_CHANNEL_ID=C...

# SendGrid
SENDGRID_API_KEY=SG....
FROM_EMAIL=hello@nexusai.fr

# HubSpot
HUBSPOT_ACCESS_TOKEN=pat-...
HUBSPOT_PORTAL_ID=...

# Google Analytics
GA4_PROPERTY_ID=...
GA4_SERVICE_ACCOUNT_JSON=...  # JSON credentials

# Anthropic (pour le reporting IA)
ANTHROPIC_API_KEY=sk-ant-...
```

