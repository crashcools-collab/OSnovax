## Déploiement Make.com

1. Créer un compte sur make.com
2. New Scenario → Import blueprint → Coller le JSON Make
3. Configurer les connexions (Slack, SendGrid, HubSpot)
4. Activer le scenario
5. Copier l'URL webhook et la coller dans Netlify Forms

## Déploiement n8n (self-hosted)

```bash
docker run -it --rm \
  -p 5678:5678 \
  -e N8N_BASIC_AUTH_ACTIVE=true \
  -e N8N_BASIC_AUTH_USER=admin \
  -e N8N_BASIC_AUTH_PASSWORD=votre_password \
  -v ~/.n8n:/home/node/.n8n \
  n8nio/n8n

# Interface : http://localhost:5678
# Importer les workflows JSON depuis l'interface
```
